# Template configuration for the `twilio` backend.
# Do not commit real credentials/secrets to git.

service:
  name: twilio
  enabled: true

runtime:
  log_level: info

paths:
  data_dir: ./data/twilio

twilio:
  # Credentials can be supplied via environment variable names, direct values,
  # or KeePassXC entry paths (auto-pass). Resolution order: direct > env > keepass.

  # Option A: environment variable names the orchestrator should read.
  account_sid_env: TWILIO_ACCOUNT_SID
  auth_token_env: TWILIO_AUTH_TOKEN

  # Option B: KeePassXC entry paths (resolved via auto-pass sibling repo).
  # account_sid_keepass_entry: Twilio/Twilio#API-Main  (reads UserName field)
  # auth_token_keepass_entry: Twilio/Twilio#Token      (reads Password field)

  # Option C: direct values (not recommended; prefer env or keepass).
  account_sid:
  auth_token:

  # Sender phone number — same three-option resolution applies.
  from_phone_env: TWILIO_FROM_PHONE
  # from_phone_keepass_entry: Twilio/Twilio             (reads UserName field)
  from_phone:

  # Base URL for Twilio REST API. HTTPS required.
  api_base_url: https://api.twilio.com

  # Optional request timeout in seconds.
  timeout_seconds: 30

  # SMS configuration (if using Twilio SMS).
  sms:
    enabled: true

    # Optional recipient allowlist.
    allowed_recipients: []
    allowed_recipient_envs: []

  # TLS settings for HTTPS API access.
  tls:
    ca_cert_path:
    ca_cert_path_env:
    insecure_skip_verify: false

env:
  # Optional overrides / additional orchestrator variables.
  # TWILIO_REGION: us1
  # (No defaults set in the template.)
