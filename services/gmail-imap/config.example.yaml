# Template configuration for `gmail-imap`.
# Gmail typically requires an app password for IMAP/SMTP access.
# Do not commit real credentials/secrets to git.

# Optional: override the AUTO_PASS_PROFILE env var for KeePassXC credential
# resolution. Set to a profile defined in auto-pass/config/auto-pass.env.local.
# Leave unset to use config/auto-pass.ini, then the infra default.
# keepass_profile: infra

service:
  name: gmail-imap
  enabled: true

runtime:
  log_level: info

paths:
  data_dir: ./data/gmail-imap

imap:
  host: imap.gmail.com
  port: 993
  use_ssl: true

  # Credentials can be supplied via environment variable names, direct values,
  # or KeePassXC entry paths (auto-pass). Resolution order: direct > env > keepass.

  # Option A: environment variable names.
  username_env: GMAIL_IMAP_USERNAME
  password_env: GMAIL_IMAP_APP_PASSWORD

  # Option B: KeePassXC entry path (auto-pass sibling repo).
  # username_keepass_entry resolves the UserName field of the entry.
  # password_keepass_entry resolves the Password field of the entry.
  # Leave these unset to use config/auto-pass.ini.
  # username_keepass_entry: email/example-account#imap
  # password_keepass_entry: email/example-account#imap

  # Option C: direct values (not recommended).
  username:
  password:

  # Mailboxes checked by check_inbox.py and test_connection.py.
  mailbox: INBOX
  mailboxes:
    - INBOX

  # Prefer readonly mailbox access by default.
  readonly: true

  timeout_seconds: 30
  poll_interval_seconds: 60

  # Optional search charset for IMAP UID SEARCH.
  search_charset:

  tls:
    # For private or self-signed mail servers, provide your CA certificate here.
    ca_cert_path:
    ca_cert_path_env:

smtp:
  host: smtp.gmail.com
  port: 465
  use_ssl: true
  starttls: false

  # Defaults to the IMAP credentials when unset.
  username_env: GMAIL_IMAP_USERNAME
  password_env: GMAIL_IMAP_APP_PASSWORD
  username:
  password:

  # Defaults to smtp.username / GMAIL_IMAP_USERNAME when unset.
  from_env: GMAIL_IMAP_FROM
  from:

  timeout_seconds: 30

  # Verify that Gmail persisted a sent copy after SMTP acceptance.
  # This confirms the message landed in a sent mailbox; it does not prove the
  # remote recipient has received or read it.
  verify_delivery: true
  verify_attempts: 4
  verify_delay_seconds: 2
  verify_recent_limit: 10
  verify_mailboxes: []

  # Optional recipient allowlist for safety.
  allowed_recipients: []
  allowed_recipient_envs: []

  tls:
    # For private or self-signed mail servers, provide your CA certificate here.
    ca_cert_path:
    ca_cert_path_env:

filters:
  # Default inbox filters used by check_inbox.py.
  unseen_only: false
  from_contains:
  subject_contains:
