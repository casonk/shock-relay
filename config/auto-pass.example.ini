# Repo-local auto-pass defaults for shock-relay services.
# Copy to config/auto-pass.ini to keep these overrides out of git.

[auto_pass]
profile = your-profile

[gmail_imap]
username_keepass_entry = email/example-account#imap
password_keepass_entry = email/example-account#imap

[twilio]
account_sid_keepass_entry = twilio/example-account#sid
auth_token_keepass_entry = twilio/example-account#token
from_phone_keepass_entry = twilio/example-account#sender
