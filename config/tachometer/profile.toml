[repo]
name = "shock-relay"
category = "util-repos"
kind = "python-shell"

[paths]
disk_path = "."
profile_path = ".tachometer/profile.json"
summary_path = ".tachometer/summary.json"

[defaults]
label = "repo-snapshot"
[notify]
shock_relay_root = "SHOCK_RELAY_ROOT_PLACEHOLDER"
service = "signal"
target = "+1XXXXXXXXXX"
